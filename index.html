<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrisCo | Official Site</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCM9hJ69HpvV_gCdapm2UmkxrumeNsJhgw",
            authDomain: "frisco-web.firebaseapp.com",
            projectId: "frisco-web",
            storageBucket: "frisco-web.firebasestorage.app",
            messagingSenderId: "1001144206780",
            appId: "1:1001144206780:web:ca8e0a1e5cd792ee0057b9",
            measurementId: "G-T534ZTPKYT"
        };
        firebase.initializeApp(firebaseConfig);
        window.auth = firebase.auth();
        window.db = firebase.firestore();
    </script>
</head>
<body>
    <header class="header shadow-sm">
        <div class="header-inner">
            <a href="#top" class="logo">FrisCo</a>
            <div class="header-right">
                <div id="nav-auth-item"></div>
                <button class="menu-toggle"><span></span><span></span><span></span></button>
            </div>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="#top">HOME</a></li>
                    <li><a href="about.html">ABOUT</a></li>
                    <li><a href="wishlist.html">WISH LIST</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1 class="hero-title-large">FrisCo.</h1>
                <p class="hero-subtitle-large">MEIJI GAKUIN UNIV.</p>
                <div id="hero-action-buttons" style="margin-top:30px; display:flex; flex-wrap:wrap; justify-content:center; gap:12px; width:100%; padding: 0 10px; box-sizing: border-box;">
                    <a href="wishlist.html" class="btn" style="background:var(--color-navy); color:white; padding:12px 20px; border-radius:30px; font-weight:800; font-size:0.85rem; flex: 1 1 auto; max-width: 200px;">WISH LIST</a>
                    <div id="hero-login-container" style="flex: 1 1 auto; max-width: 200px;">
                        <button id="hero-login-btn" onclick="document.getElementById('auth-modal').style.display='flex'" class="btn" style="width:100%; background:white; color:var(--color-navy); border:2px solid var(--color-navy); padding:10px 20px; border-radius:30px; font-weight:800; font-size:0.85rem;">LOGIN</button>
                    </div>
                    <a href="about.html" class="btn" style="background:var(--color-accent); color:white; padding:12px 20px; border-radius:30px; font-weight:800; font-size:0.85rem; flex: 1 1 auto; max-width: 200px;">JOIN US</a>
                </div>
                <div id="hero-user-display" style="margin-top:20px; font-weight:800; font-size:1.5rem; color:var(--color-navy);"></div>
            </div>
        </section>

        <section id="schedule" class="section">
            <div class="container">
                <h2 class="section-title">SCHEDULE</h2>
                <!-- このクラスをCSSで制御します -->
                <div class="calendar-main-layout">
                    <!-- 左/上：カレンダー -->
                    <div class="calendar-column">
                        <div class="calendar-wrapper glass-panel" style="padding:20px; border-radius:15px;">
                            <div class="calendar-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                                <button id="prev-month" class="cal-btn">&lt;</button>
                                <h3 id="month-year" style="font-family:var(--font-en); font-weight:800;">2026.05</h3>
                                <button id="next-month" class="cal-btn">&gt;</button>
                            </div>
                            <div class="calendar-weekdays" style="display:grid; grid-template-columns:repeat(7,1fr); text-align:center; font-size:0.7rem; color:#888; margin-bottom:10px;">
                                <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
                            </div>
                            <div id="calendar-grid" class="calendar-grid"></div>
                        </div>
                    </div>
                    <!-- 右/下：詳細 & 管理 -->
                    <div id="calendar-detail-panel" class="detail-column">
                        <p style="text-align:center; opacity:0.5; padding:40px;">予定を読み込んでいます...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="auth-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content glass-panel">
            <button class="modal-close">&times;</button>
            <h3>LOGIN</h3>
            <form id="auth-form">
                <input type="email" id="auth-email" placeholder="Email" required style="width:100%; margin-bottom:10px; padding:10px; border-radius:5px; border:1px solid #ddd;">
                <input type="password" id="auth-password" placeholder="Password" required style="width:100%; margin-bottom:10px; padding:10px; border-radius:5px; border:1px solid #ddd;">
                <button type="submit" class="btn btn-primary" style="width:100%;">ENTER</button>
            </form>
        </div>
    </div>

    <div id="attendance-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content glass-panel">
            <button class="modal-close">&times;</button>
            <h3 id="att-modal-date"></h3>
            <p id="att-modal-event" style="font-weight:800;"></p>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
                <button class="btn att-choice-btn" data-status="going" style="border:1px solid #3182ce; color:#3182ce;">GOING</button>
                <button class="btn att-choice-btn" data-status="absent" style="border:1px solid #e53e3e; color:#e53e3e;">ABSENT</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
